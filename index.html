<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="script.js"></script>

    <title>Frontend Mentor | Frontend quiz app</title>
  </head>

  <body>
    <main>
      <section id="app-container" class="app-container">
        <div id="darkmode-switch-wrapper" class="darkmode-switch-wrapper">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            fill="none"
            viewBox="0 0 24 24"
          >
            <path
              fill="#626C7F"
              d="M12 1.5a.75.75 0 0 1 .75.75v1.5a.75.75 0 1 1-1.5 0v-1.5A.75.75 0 0 1 12 1.5Zm0 15a4.5 4.5 0 1 0 0-9 4.5 4.5 0 0 0 0 9Zm0-1.5a3 3 0 1 1 0-6 3 3 0 0 1 0 6Zm9.75-2.25a.75.75 0 1 0 0-1.5h-1.5a.75.75 0 1 0 0 1.5h1.5ZM12 19.5a.75.75 0 0 1 .75.75v1.5a.75.75 0 1 1-1.5 0v-1.5a.75.75 0 0 1 .75-.75Zm-8.25-6.75a.75.75 0 1 0 0-1.5h-1.5a.75.75 0 1 0 0 1.5h1.5Zm.969-8.031a.75.75 0 0 1 1.062 0l1.5 1.5a.751.751 0 0 1-1.062 1.062l-1.5-1.5a.75.75 0 0 1 0-1.062Zm1.062 14.562a.75.75 0 1 1-1.062-1.06l1.5-1.5a.75.75 0 1 1 1.062 1.06l-1.5 1.5Zm13.5-14.562a.75.75 0 0 0-1.062 0l-1.5 1.5a.751.751 0 0 0 1.062 1.062l1.5-1.5a.75.75 0 0 0 0-1.062Zm-1.062 14.562a.75.75 0 0 0 1.062-1.06l-1.5-1.5a.75.75 0 0 0-1.062 1.06l1.5 1.5Z"
            />
          </svg>
          <label class="dm-switch">
            <input type="checkbox" />
            <span class="dm-slider"></span>
          </label>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            fill="none"
            viewBox="0 0 24 24"
          >
            <path
              fill="#626C7F"
              d="M11.775 4.522A7.5 7.5 0 1 1 4.898 16.09c2.104-.57 4.974-1.953 6.24-5.326.828-2.211.876-4.408.637-6.241ZM20.184 12a8.997 8.997 0 0 0-9.315-8.994.75.75 0 0 0-.713.888c.345 1.821.42 4.092-.424 6.342-1.2 3.201-4.203 4.26-6.115 4.606a.75.75 0 0 0-.542 1.066A9 9 0 0 0 20.184 12Z"
            />
          </svg>
        </div>

        <div id="menu-container" class="menu-container">
          <!-- Quiz menu start -->

          <h1>Welcome to the <span class="h1-segment">Frontend Quiz!</span></h1>

          <p class="pick">Pick a subject to get started.</p>

          <div class="subject-btns">
            <button type="button" class="subject-btn" id="html-btn">
              <img
                src="./assets/images/icon-html.svg"
                alt=""
                class="subject-icon html-icon"
              /><span class="btn-text">HTML</span>
            </button>

            <button type="button" class="subject-btn" id="css-btn">
              <img
                src="./assets/images/icon-css.svg"
                alt=""
                class="subject-icon css-icon"
              /><span class="btn-text">CSS</span>
            </button>

            <button type="button" class="subject-btn" id="js-btn">
              <img
                src="./assets/images/icon-js.svg"
                alt=""
                class="subject-icon js-icon"
              /><span class="btn-text">JavaScript</span>
            </button>

            <button type="button" class="subject-btn" id="a11y-btn">
              <img
                src="./assets/images/icon-accessibility.svg"
                alt=""
                class="subject-icon a11y-icon"
              /><span class="btn-text">Accessibility</span>
            </button>
          </div>

          <!-- Quiz menu end -->
        </div>
        <div id="questions-container" class="questions-container">
          <!-- Quiz question start -->

          Question
          <!-- number -->
          of 10 A B C D Submit answer

          <!-- Quiz question end -->
        </div>
        <div id="completed-container" class="completed-container">
          <!-- Quiz completed start -->

          Quiz completed You scored...

          <!-- score -->
          out of 10

          <!-- Quiz completed end -->
        </div>
      </section>
    </main>
  </body>
</html>
